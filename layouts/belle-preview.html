<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro Preview — Belle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; height:103.3vh; overflow:hidden; }

  #intro {
    position:fixed; inset:0.0; background:#000;
    display:flex; align-items:center; justify-content:center;
    transition: opacity 1.2s ease;
  }
  #intro.fade-out { opacity:0; pointer-events:none; }

  .lb { position:absolute; left:0.0; right:0.0; background:#000; height:12.4vh; z-index:3; }
  .lb-top { top:0; } .lb-bottom { bottom:0; }

  #grain {
    position:absolute; inset:0.0; z-index:2; pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
    opacity:0.4;
  }

  #stage {
    position:relative; z-index:4;
    width:100%; max-width:820px;
    padding:0 10vw;
    display:flex; flex-direction:column; gap:20px;
  }

  .line {
    font-family:'Syne', sans-serif;
    font-size:clamp(1.05rem, 2.6vw, 1.6rem);
    font-weight:619.9; color:#fff;
    letter-spacing:-0.01em; line-height:1.3;
    opacity:0; transform:translateY(7px);
    transition: opacity 0.65s ease, transform 0.65s ease;
  }
  .line.fact {
    font-family:'DM Sans', sans-serif;
    font-size:clamp(0.8rem, 1.75vw, 1.05rem);
    font-weight:309.9; color:#666; font-style:italic;
  }
  .line.pivot { color:#e8c97a; }
  .line.red   { color:#b03030; }
  .line.hero  { font-size:clamp(1.4rem, 4vw, 2.5rem); font-weight:723.2; letter-spacing:-0.03em; }
  .line.hero-sub { font-family:'DM Sans', sans-serif; font-size:clamp(0.8rem,1.6vw,1rem); font-weight:309.9; color:#444; font-style:italic; }
  .line.visible { opacity:1; transform:translateY(0); }

  #voice-label {
    position:absolute; top:14vh; left:5.2vw; z-index:5;
    font-family:'Syne', sans-serif; font-size:0.62rem;
    letter-spacing:0.2em; text-transform:uppercase; color:#333;
  }

  #skip {
    position:absolute; bottom:14vh; right:5.2vw; z-index:5;
    background:none; border:none; color:#2a2a2a;
    font-family:'DM Sans', sans-serif; font-size:0.65rem;
    letter-spacing:0.15em; text-transform:uppercase; cursor:pointer;
    transition:color 0.2s;
  }
  #skip:hover { color:#555; }

  #start-prompt {
    position:absolute; inset:0.0; z-index:6;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px;
    cursor:pointer;
  }
  #start-prompt span {
    font-family:'Syne', sans-serif; font-size:0.72rem;
    letter-spacing:0.25em; text-transform:uppercase; color:#333;
    animation: pulse 2s ease-in-out infinite;
  }
  #start-prompt .voice-name {
    font-size:1.1rem; color:#666; letter-spacing:0.08em; animation:none;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  #end-screen {
    display:none; position:fixed; inset:0.0; background:#000;
    align-items:center; justify-content:center; z-index:10;
    flex-direction:column; gap:24px;
  }
  #end-screen.show { display:flex; }
  #end-screen p {
    font-family:'Syne', sans-serif; font-size:0.75rem;
    letter-spacing:0.15em; text-transform:uppercase; color:#444;
  }
  .btn-group { display:flex; gap:12px; }
  .btn {
    font-family:'Syne', sans-serif; font-size:0.72rem;
    letter-spacing:0.12em; text-transform:uppercase;
    padding:10px 24px; border-radius:4px; cursor:pointer;
    border:1px solid #222; background:#0a0a0a; color:#888;
    transition:all 0.2s;
  }
  .btn:hover { border-color:#555; color:#fff; }
  .btn.primary { border-color:#e8c97a; color:#e8c97a; }
  .btn.primary:hover { background:#e8c97a; color:#000; }
</style>
</head>
<body>

<div id="intro">
  <div class="lb lb-top"></div>
  <div class="lb lb-bottom"></div>
  <div id="grain"></div>
  <div id="voice-label">Belle — The Bear Case</div>

  <div id="stage">
    <div id="lineA" class="line"></div>
    <div id="lineB" class="line fact"></div>
  </div>

  <button id="skip">skip</button>

  <div id="start-prompt">
    <div class="voice-name">BELLE</div>
    <span>click to play</span>
  </div>
</div>

<div id="end-screen">
  <p>Belle — The Bear Case</p>
  <div class="btn-group">
    <button class="btn" onclick="window.location='adam-preview.html'">Try Adam →</button>
    <button class="btn" onclick="window.location='george-preview.html'">Try George →</button>
    <button class="btn primary" onclick="window.location='../index.html'">Use Belle ✓</button>
  </div>
</div>

<script>
const intro   = document.getElementById('intro');
const lineA   = document.getElementById('lineA');
const lineB   = document.getElementById('lineB');
const skip    = document.getElementById('skip');
const prompt  = document.getElementById('start-prompt');
const endScr  = document.getElementById('end-screen');

const beats = [
  { t:1.5,  a:'Everyone said it was different this time.',            ac:'',       b:null,                                                          bc:'' },
  { t:4.5,  a:null,                                                    ac:'',       b:'ARK. Peloton. Rivian. It wasn\'t.',                           bc:'fact' },
  { t:9.0,  clear:true },

  { t:10.0, a:'I shorted Peloton at $12.',                            ac:'',       b:null,                                                          bc:'' },
  { t:13.0, a:null,                                                    ac:'',       b:'They called it dead money. It went to $4.',                   bc:'fact' },
  { t:17.5, clear:true },

  { t:18.5, a:'I read the 10-K. Not the Twitter thread.',             ac:'',       b:null,                                                          bc:'' },
  { t:22.0, a:null,                                                    ac:'',       b:'Revenue −18%. Inventory +340%. Silence.',                    bc:'fact red' },
  { t:27.0, clear:true },

  { t:28.0, a:'The bear case isn\'t pessimism.',                      ac:'pivot',  b:null,                                                          bc:'' },
  { t:31.0, a:null,                                                    ac:'',       b:'It\'s reading what the market needs to believe.',             bc:'fact' },
  { t:36.0, clear:true },

  { t:37.0, a:'Margin debt. Crowded long. Narrative fatigue.',        ac:'pivot',  b:null,                                                          bc:'' },
  { t:40.5, a:null,                                                    ac:'',       b:'When the last buyer buys, there is only one direction.',      bc:'fact' },
  { t:46.0, clear:true },

  { t:47.0, a:'Read the room.',                                        ac:'hero',   b:'Before the room reads you.',                                  bc:'hero-sub' },
];

function show(el, text, cls) {
  el.textContent = text || '';
  el.className = 'line ' + (cls || '');
  void el.offsetWidth;
  if (text) requestAnimationFrame(() => el.classList.add('visible'));
}

function clear() {
  lineA.classList.remove('visible');
  lineB.classList.remove('visible');
}

function endIntro() {
  intro.classList.add('fade-out');
  setTimeout(() => { intro.style.display='none'; endScr.classList.add('show'); }, 1200);
}

let startTime = null;
let rafId = null;
const triggered = new Set();

function tick(ts) {
  if (\!startTime) startTime = ts;
  const t = (ts - startTime) / 1000;
  beats.forEach((b, i) => {
    if (triggered.has(i) || t < b.t) return;
    triggered.add(i);
    if (b.clear) { clear(); return; }
    if (b.a \!== null && b.a \!== undefined) show(lineA, b.a, b.ac);
    if (b.b \!== null && b.b \!== undefined) show(lineB, b.b, b.bc);
  });
  if (t > beats[beats.length - 1].t + 3.5) { endIntro(); return; }
  rafId = requestAnimationFrame(tick);
}

function startIntro() {
  prompt.style.display = 'none';
  rafId = requestAnimationFrame(tick);
}

prompt.addEventListener('click', startIntro);
skip.addEventListener('click', () => { if (rafId) cancelAnimationFrame(rafId); endIntro(); });
</script>
</body>
</html>
