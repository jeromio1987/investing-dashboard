<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dead Quiet - Adam</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; height:100vh; overflow:hidden; }
#intro { position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; transition:opacity 1.2s ease; }
#intro.fade-out { opacity:0; pointer-events:none; }
.lb { position:absolute; left:0; right:0; background:#000; height:12vh; z-index:3; }
.lb-top { top:0; } .lb-bottom { bottom:0; }
#grain { position:absolute; inset:0; z-index:2; pointer-events:none; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E"); opacity:0.4; }
#stage { position:relative; z-index:4; width:100%; max-width:820px; padding:0 10vw; display:flex; flex-direction:column; gap:20px; }
.line { font-family:"Syne",sans-serif; font-size:clamp(1.05rem,2.6vw,1.6rem); font-weight:600; color:#fff; letter-spacing:-0.01em; line-height:1.3; opacity:0; transform:translateY(7px); transition:opacity 0.65s ease,transform 0.65s ease; }
.line.fact { font-family:"DM Sans",sans-serif; font-size:clamp(0.8rem,1.75vw,1.05rem); font-weight:300; color:#666; font-style:italic; }
.line.pivot { color:#e8c97a; }
.line.red { color:#b03030; }
.line.hero { font-size:clamp(1.4rem,4vw,2.5rem); font-weight:700; letter-spacing:-0.03em; }
.line.hero-sub { font-family:"DM Sans",sans-serif; font-size:clamp(0.8rem,1.6vw,1rem); font-weight:300; color:#444; font-style:italic; }
.line.visible { opacity:1; transform:translateY(0); }
#lbl { position:absolute; top:14vh; left:5vw; z-index:5; font-family:"Syne",sans-serif; font-size:0.62rem; letter-spacing:0.2em; text-transform:uppercase; color:#333; }
#skip { position:absolute; bottom:14vh; right:5vw; z-index:5; background:none; border:none; color:#2a2a2a; font-family:"DM Sans",sans-serif; font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase; cursor:pointer; }
#prompt { position:absolute; inset:0; z-index:6; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; cursor:pointer; }
#prompt .vn { font-family:"Syne",sans-serif; font-size:1.1rem; color:#666; letter-spacing:0.08em; }
#prompt .ch { font-family:"Syne",sans-serif; font-size:0.72rem; letter-spacing:0.25em; text-transform:uppercase; color:#333; animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
#end { display:none; position:fixed; inset:0; background:#000; align-items:center; justify-content:center; z-index:10; flex-direction:column; gap:32px; }
#end.show { display:flex; }
#dq-brand { font-family:"Syne",sans-serif; font-size:clamp(2rem,6vw,3.5rem); font-weight:700; color:#fff; letter-spacing:-0.03em; min-height:1.2em; }
#dq-tag { font-family:"DM Sans",sans-serif; font-size:clamp(0.75rem,1.5vw,0.95rem); color:#444; font-style:italic; opacity:0; transition:opacity 0.8s ease; }
#dq-tag.show { opacity:1; }
.bg { display:flex; gap:12px; opacity:0; transition:opacity 0.6s ease; }
.bg.show { opacity:1; }
.bt { font-family:"Syne",sans-serif; font-size:0.72rem; letter-spacing:0.12em; text-transform:uppercase; padding:10px 24px; border-radius:4px; cursor:pointer; border:1px solid #222; background:#0a0a0a; color:#888; transition:all 0.2s; }
.bt:hover { border-color:#555; color:#fff; }
.bt.p { border-color:#e8c97a; color:#e8c97a; }
.bt.p:hover { background:#e8c97a; color:#000; }
</style>
</head>
<body>

<audio id="au" src="../adam2.mp3" preload="auto"></audio>

<div id="intro">
  <div class="lb lb-top"></div>
  <div class="lb lb-bottom"></div>
  <div id="grain"></div>
  <div id="lbl">Adam</div>
  <div id="stage">
    <div id="la" class="line"></div>
    <div id="lb" class="line fact"></div>
  </div>
  <button id="skip">skip</button>
  <div id="prompt">
    <div class="vn">DEAD QUIET</div>
    <div class="ch">click to play</div>
  </div>
</div>

<div id="end">
  <div id="dq-brand"></div>
  <div id="dq-tag">Find them first. Leave before everyone else gets stupid.</div>
  <div class="bg" id="dq-btns">
    <button class="bt" onclick="location.reload()">Replay</button>
    <button class="bt p" onclick="window.location='../index.html'">Enter Dashboard</button>
  </div>
</div>

<script>
var au     = document.getElementById("au");
var la     = document.getElementById("la");
var lb     = document.getElementById("lb");
var intro  = document.getElementById("intro");
var endDiv = document.getElementById("end");
var triggered = {};
var audioActive = false;

var beats = [
  {t:0.8,  a:"I bought Robinhood at $38 on IPO day.",                      ac:"",      b:null, bc:""},
  {t:4.0,  a:null, ac:"", b:"The platform built for retail. Down 75% in six months.", bc:"fact"},
  {t:9.5,  clear:true},
  {t:10.5, a:"Beyond Meat was going to change everything.",                  ac:"",      b:null, bc:""},
  {t:14.0, a:null, ac:"", b:"It went from $230 to $8.",                                bc:"fact red"},
  {t:18.5, clear:true},
  {t:19.5, a:"WeWork was valued at $47 billion.",                            ac:"",      b:null, bc:""},
  {t:23.0, a:null, ac:"", b:"It never IPO'd. You couldn't even get in to lose money.", bc:"fact"},
  {t:29.5, clear:true},
  {t:30.5, a:"I bought ETH at $5,000.",                                      ac:"",      b:null, bc:""},
  {t:33.5, a:null, ac:"", b:"Six months later it was $1,100.",                         bc:"fact red"},
  {t:38.5, clear:true},
  {t:39.5, a:"Small cap. Mid cap. Float under 30 million shares.",           ac:"pivot", b:null, bc:""},
  {t:43.0, a:null, ac:"", b:"Goldman has 20 analysts on Apple. Satellite data. Alt data. They don't cover a $200M float.", bc:"fact"},
  {t:48.5, clear:true},
  {t:49.5, a:"No analyst on the call. No Bloomberg alert. No price target.", ac:"pivot", b:null, bc:""},
  {t:53.0, a:null, ac:"", b:"That's where the setup lives.",                           bc:"fact"},
  {t:55.5, clear:true},
  {t:56.5, a:"You don't need to be smarter. You need to be earlier.",        ac:"pivot", b:null, bc:""},
  {t:60.0, clear:true},
  {t:61.0, a:"One trigger. Nobody watching yet.",                            ac:"pivot", b:"That window doesn't stay open long.", bc:"fact"},
  {t:65.5, clear:true},
  {t:66.5, a:"Narrative. Catalyst. Float. Vacuum.",                          ac:"pivot", b:null, bc:""},
  {t:69.0, a:null, ac:"", b:"Position before the narrative spreads. Exit before it peaks.", bc:"fact"},
  {t:73.5, clear:true},
  {t:74.5, a:"Find them first.",                                             ac:"hero",  b:"Leave before everyone else gets stupid.", bc:"hero-sub"}
];

function sl(el,txt,cls){el.textContent=txt;el.className="line "+cls;void el.offsetWidth;setTimeout(function(){el.classList.add("visible");},20);}
function cl(){la.classList.remove("visible");lb.classList.remove("visible");}
function fireBeat(b){if(b.clear){cl();return;}if(b.a){sl(la,b.a,b.ac);}if(b.b){sl(lb,b.b,b.bc);}}

function done(){
  intro.classList.add("fade-out");
  setTimeout(function(){
    intro.style.display="none";
    endDiv.classList.add("show");
    var brand=document.getElementById("dq-brand");
    var tag=document.getElementById("dq-tag");
    var btns=document.getElementById("dq-btns");
    var txt="Dead Quiet."; var i=0; brand.textContent="";
    var tw=setInterval(function(){
      brand.textContent+=txt[i]; i++;
      if(i>=txt.length){
        clearInterval(tw);
        setTimeout(function(){tag.classList.add("show");setTimeout(function(){btns.classList.add("show");},600);},400);
        if(window.speechSynthesis){var u=new SpeechSynthesisUtterance("Dead Quiet");u.rate=0.55;u.pitch=0.4;u.volume=0.85;window.speechSynthesis.speak(u);}
      }
    },80);
  },1200);
}

au.ontimeupdate=function(){
  audioActive=true;
  var t=au.currentTime;
  for(var i=0;i<beats.length;i++){
    if(triggered[i] || t<beats[i].t) continue;
    triggered[i]=true; fireBeat(beats[i]);
  }
};
au.onended=function(){setTimeout(done,1200);};

function timerFallback(){
  for(var i=0;i<beats.length;i++){
    (function(b,idx){
      setTimeout(function(){
        if(triggered[idx] == null){triggered[idx]=true;fireBeat(b);}
      },b.t*1000);
    })(beats[i],i);
  }
  setTimeout(done,78800);
}

document.getElementById("prompt").addEventListener("click",function(){
  document.getElementById("prompt").style.display="none";
  au.play().catch(function(){timerFallback();});
  setTimeout(function(){if(audioActive == false){timerFallback();}},1200);
});
document.getElementById("skip").addEventListener("click",function(){au.pause();done();});

</script>
</body>
</html>
