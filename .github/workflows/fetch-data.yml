name: Fetch SMID Data

on:
  schedule:
    # 4x daily: 07:00, 12:00, 16:00, 20:00 UTC
    - cron: '0 7 * * 1-5'
    - cron: '0 12 * * 1-5'
    - cron: '0 16 * * 1-5'
    - cron: '0 20 * * 1-5'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch live data
        run: python fetch_smid_data.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add smid_data.json
          git diff --staged --quiet || git commit -m "data: auto-update smid_data.json $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
